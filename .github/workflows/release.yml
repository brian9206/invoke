name: Draft Release

on:
  push:
    tags:
      - 'v*' # Triggers on v1.0.0, v2.1.0-beta, etc.

jobs:
  # 1. Call your existing build workflow to generate the binaries
  trigger-build:
    name: Build CLI Binaries
    uses: ./.github/workflows/build-cli.yml # Points directly to your build file

  # 2. Once the build finishes, create the draft release and attach artifacts
  create-release:
    name: Create Draft Release
    needs: trigger-build # Waits for the build job to successfully finish
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a release draft

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Downloads the artifact uploaded by the build-cli.yml workflow
      - name: Download Build Binaries
        uses: actions/download-artifact@v4
        with:
          name: invoke-cli
          path: ./binaries

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          name: CLI - ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          generate_release_notes: true
          files: |
            ./binaries/**/*
