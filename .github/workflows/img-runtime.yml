name: Build and Push Runtime

on:
  workflow_dispatch:
#  push:
#    branches:
#      - main
#      - master
#    paths:
#      - 'invoke-runtime/**'
#      - 'package-lock.json'
#      - '.github/workflows/img-runtime.yml'

permissions:
  contents: read
  packages: write

jobs:
  execution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./invoke-runtime/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/runtime:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
