name: Publish @types/invoke to npm

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'invoke-runtime/types/package.json'
      - '.github/workflows/npm-publish-types.yml'

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: npm install

      - name: Install invoke-runtime/types dependencies
        run: npm install --prefix invoke-runtime/types --include=dev

      - name: Check if version already published
        id: version_check
        run: |
          VERSION=$(node -p "require('./invoke-runtime/types/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if npm view @types/invoke@$VERSION version 2>/dev/null; then
            echo "already_published=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION is already published, skipping."
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION is not yet published, proceeding."
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.already_published == 'false'
        run: npm publish
        working-directory: invoke-runtime/types
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
