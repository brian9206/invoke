services:
  # PostgreSQL Database
  postgres-app:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3

  postgres-logs:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${LOG_DB_NAME}
      POSTGRES_USER: ${LOG_DB_USER}
      POSTGRES_PASSWORD: ${LOG_DB_PASSWORD}
    volumes:
      - postgres-logs_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3


  # MinIO Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      start_period: 5s
      retries: 3

  # Execution Service
  execution:
    build:
      context: .
      dockerfile: invoke-execution/Dockerfile
    image: ghcr.io/brian9206/invoke/execution:latest
    ports:
      - "${EXECUTION_PORT}:3000"
    env_file:
      - .env
    environment:
      - TRUST_PROXY=${TRUST_PROXY}
      - DB_HOST=postgres-app
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - S3_ENDPOINT=minio
      - S3_PORT=9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - RATE_LIMIT=${RATE_LIMIT}
      - EXECUTION_TIMEOUT=${EXECUTION_TIMEOUT}
      - CACHE_TTL_DAYS=${CACHE_TTL_DAYS}
      - MAX_CACHE_SIZE_GB=${MAX_CACHE_SIZE_GB}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      - GATEWAY_SERVICE_URL=http://gateway:3000
      - LOGGER_SERVICE_URL=http://logger:3000
      - RUNTIME_IMAGE=${RUNTIME_IMAGE:-invoke-runtime:latest}
      - SANDBOX_MIN_POOL_SIZE=${SANDBOX_MIN_POOL_SIZE:-5}
      - SANDBOX_MAX_POOL_SIZE=${SANDBOX_MAX_POOL_SIZE:-20}
      - SANDBOX_MEMORY_MB=${SANDBOX_MEMORY_MB:-256}
      - SANDBOX_RUNTIME=${SANDBOX_RUNTIME:-runsc}
      - DOCKER_SOCKET=/var/run/docker.sock
      # Set GVISOR_PLATFORM=ptrace to fall back if /dev/kvm is unavailable
      - GVISOR_PLATFORM=${GVISOR_PLATFORM:-kvm}
    privileged: true
    cgroupns_mode: host
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    devices:
      - /dev/kvm:/dev/kvm
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /var/lib/docker
      - execution_cache:/tmp/cache
    depends_on:
      postgres-app:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: ${EXECUTION_REPLICAS}

  # Admin Service
  admin:
    build:
      context: .
      dockerfile: invoke-admin/Dockerfile
    image: ghcr.io/brian9206/invoke/admin:latest
    ports:
      - "${ADMIN_PORT}:3000"
    env_file:
      - .env
    environment:
      - TRUST_PROXY=${TRUST_PROXY}
      - DB_HOST=postgres-app
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - S3_ENDPOINT=minio
      - S3_PORT=9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - EXECUTION_SERVICE_URL=http://execution:3000
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      - LOGGER_SERVICE_URL=http://logger:3000
    depends_on:
      postgres-app:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # API Gateway Service
  gateway:
    build:
      context: .
      dockerfile: invoke-gateway/Dockerfile
    image: ghcr.io/brian9206/invoke/gateway:latest
    ports:
      - "${GATEWAY_PORT}:3000"
    env_file:
      - .env
    environment:
      - TRUST_PROXY=${TRUST_PROXY}
      - DB_HOST=postgres-app
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - EXECUTION_SERVICE_URL=http://execution:3000
      - CACHE_REFRESH_INTERVAL=${CACHE_REFRESH_INTERVAL}
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      - LOGGER_SERVICE_URL=http://logger:3000
    depends_on:
      postgres-app:
        condition: service_healthy
      execution:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: ${GATEWAY_REPLICAS}

  # Logger Service
  logger:
    build:
      context: .
      dockerfile: invoke-logger/Dockerfile
    image: ghcr.io/brian9206/invoke/logger:latest
    env_file:
      - .env
    environment:
      - DB_HOST=postgres-app
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - LOG_DB_HOST=postgres-logs
      - LOG_DB_PORT=5432
      - LOG_DB_NAME=${LOG_DB_NAME}
      - LOG_DB_USER=${LOG_DB_USER}
      - LOG_DB_PASSWORD=${LOG_DB_PASSWORD}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
    depends_on:
      postgres-app:
        condition: service_healthy
      postgres-logs:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: ${LOGGER_REPLICAS}
  scheduler:
    build:
      context: .
      dockerfile: invoke-scheduler/Dockerfile
    image: ghcr.io/brian9206/invoke/scheduler:latest
    env_file:
      - .env
    environment:
      - EXECUTION_SERVICE_URL=http://execution:3000
      - ADMIN_SERVICE_URL=http://admin:3000
      - LOGGER_SERVICE_URL=http://logger:3000
      - SCHEDULER_INTERVAL=${SCHEDULER_INTERVAL}
      - LOG_CLEANUP_INTERVAL=${LOG_CLEANUP_INTERVAL}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      - TZ=${TZ}
    depends_on:
      execution:
        condition: service_healthy
      admin:
        condition: service_started
      logger:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  postgres-logs_data:
  minio_data:
  execution_cache:

networks:
  default:
    driver: bridge
