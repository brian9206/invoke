services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Execution Service
  execution:
    build:
      context: .
      dockerfile: invoke-execution/Dockerfile
    image: ghcr.io/brian9206/invoke/execution:latest
    ports:
      - "${EXECUTION_PORT}:3000"
    env_file:
      - .env
    environment:
      - TRUST_PROXY=true
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_PORT=${S3_PORT}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - CACHE_DIR=${CACHE_DIR}
      - RATE_LIMIT=${RATE_LIMIT}
      - EXECUTION_TIMEOUT=${EXECUTION_TIMEOUT}
      - CACHE_TTL_DAYS=${CACHE_TTL_DAYS}
      - MAX_CACHE_SIZE_GB=${MAX_CACHE_SIZE_GB}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
    volumes:
      - execution_cache:/app/cache
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # Admin Service
  admin:
    build:
      context: .
      dockerfile: invoke-admin/Dockerfile
    image: ghcr.io/brian9206/invoke/admin:latest
    ports:
      - "${ADMIN_PORT}:3000"
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_PORT=${S3_PORT}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - EXECUTION_SERVICE_URL=http://execution:3000
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # API Gateway Service
  gateway:
    build:
      context: .
      dockerfile: invoke-gateway/Dockerfile
    image: ghcr.io/brian9206/invoke/invoke-gateway:latest
    ports:
      - "${GATEWAY_PORT}:3000"
    env_file:
      - .env
    environment:
      - TRUST_PROXY=true
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - EXECUTION_SERVICE_URL=http://execution:3000
      - CACHE_REFRESH_INTERVAL=${CACHE_REFRESH_INTERVAL}
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      execution:
        condition: service_healthy
    restart: unless-stopped

  # Scheduler Service
  scheduler:
    build:
      context: .
      dockerfile: invoke-scheduler/Dockerfile
    image: ghcr.io/brian9206/invoke/scheduler:latest
    env_file:
      - .env
    environment:
      - EXECUTION_SERVICE_URL=http://execution:3000
      - ADMIN_SERVICE_URL=http://admin:3000
      - SCHEDULER_INTERVAL=${SCHEDULER_INTERVAL}
      - LOG_CLEANUP_INTERVAL=${LOG_CLEANUP_INTERVAL}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      - TZ=${TZ}
    depends_on:
      execution:
        condition: service_healthy
      admin:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  execution_cache:

networks:
  default:
    driver: bridge
